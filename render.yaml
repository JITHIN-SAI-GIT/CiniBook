services:
  # -------------------------
  # BACKEND: Spring Boot API
  # -------------------------
  - type: web
    name: cinebook-backend
    env: docker
    region: singapore # or your preferred region
    plan: free
    healthCheckPath: /actuator/health
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      # Render dynamically sets PORT
      - key: PORT
        value: 8080
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: cinebook-frontend
          envVarKey: RENDER_EXTERNAL_URL
      # These must be filled in the Render Dashboard manually
      - key: TMDB_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: B2_KEY_ID
        sync: false
      - key: B2_APPLICATION_KEY
        sync: false
      - key: B2_BUCKET_NAME
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_ID
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DRIVE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: AIVEN_HOST
        sync: false
      - key: AIVEN_PORT
        sync: false
      - key: AIVEN_DB_NAME
        sync: false
      - key: AIVEN_DB_USER
        sync: false
      - key: AIVEN_DB_PASSWORD
        sync: false

  # -------------------------
  # FRONTEND: React + Vite
  # -------------------------
  - type: web
    name: cinebook-frontend
    env: static
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./project/dist
    envVars:
      # Dynamically inject the backend URL into the frontend build
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: cinebook-backend
          envVarKey: RENDER_EXTERNAL_URL
        # Append /api since Render_EXTERNAL_URL is just the root domain
        # Wait, fromService doesn't allow string interpolation directly in render.yaml.
        # We will use a script in package.json or rely on a generic fallback, OR just manually set it in dashboard.
        # It's safer to just set it manually in dashboard, but we'll try this and user can override.
      - key: VITE_WS_URL
        sync: false
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
