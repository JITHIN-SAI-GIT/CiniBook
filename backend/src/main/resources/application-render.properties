# ===========================
# Render Production DataSource
# ===========================
# Activate this profile with SPRING_PROFILES_ACTIVE=render in the Render Dashboard.
# The Dockerfile dynamically injects SSL parameters via SPRING_DATASOURCE_URL
# based on the presence of the Aiven ca.pem file to prevent crash-loops.

# The base URL (overridden by start.sh if SSL is applied dynamically)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cinebook}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# HikariCP Connection Pool (Optimized for Render)
# ===========================
# Render aggressively drops idle connections after 5 minutes.
# These settings keep connections alive and recycle them cleanly.
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=2
# Max lifetime (9 minutes) - must be less than DB wait_timeout and Render's idle drop
spring.datasource.hikari.max-lifetime=540000
# Idle timeout (8 minutes)
spring.datasource.hikari.idle-timeout=480000
# Connection timeout (20 seconds)
spring.datasource.hikari.connection-timeout=20000
# Keepalive (30 seconds)
spring.datasource.hikari.keepalive-time=30000

# ===========================
# Hibernate Production Settings
# ===========================
# Validate the schema instead of automatically updating in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true
