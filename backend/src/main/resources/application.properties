# ===========================
# CineBook Spring Boot Config
# ===========================

# Server
server.port=${PORT:8080}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# MySQL DataSource — connection details are in profile-specific files:
#   application-render.properties (TiDB Cloud)
#   application-local.properties  (local MySQL — fallback)

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# SQL init (seed data after schema creation)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# JWT
jwt.secret=${JWT_SECRET:defaultSecretKeyThatIsAtLeast32BytesLongForHS256CineBook!}
jwt.expiration=86400000

# Logging
logging.level.com.cinebook=INFO
logging.level.org.springframework.security=WARN

# Mail (SMTP)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# TMDB
TMDB_API_KEY=${TMDB_API_KEY}

# Multipart Upload Configurations
spring.servlet.multipart.max-file-size=5000MB
spring.servlet.multipart.max-request-size=5000MB
spring.servlet.multipart.enabled=true

# Backblaze B2 (S3-compatible)
b2.key-id=${B2_KEY_ID:NOT_SET}
b2.application-key=${B2_APPLICATION_KEY:NOT_SET}
b2.bucket-name=${B2_BUCKET_NAME:NOT_SET}
b2.endpoint=${B2_ENDPOINT:https://s3.us-east-005.backblazeb2.com}

# Cache (Caffeine with 10-minute TTL for TMDB data)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s

# Upload chunk sizes (bytes) — configurable per cloud provider
upload.chunk-size.google-drive=5242880
upload.chunk-size.backblaze=10485760
