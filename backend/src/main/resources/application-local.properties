# ===========================
# Local MySQL DataSource
# ===========================
# Activate this profile with: -Dspring.profiles.active=local
# or set SPRING_PROFILES_ACTIVE=local in your environment

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
