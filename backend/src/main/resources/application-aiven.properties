# ===========================
# Aiven.io MySQL DataSource
# ===========================
# This is the default profile. Uses Aiven's managed MySQL over the public internet.
#
# Required environment variables (set in .env):
#   AIVEN_HOST              — e.g. mysql-cinibook-jithin.aivencloud.com
#   AIVEN_PORT              — e.g. 24185
#   AIVEN_DB_NAME           — database/schema name (usually defaultdb or cinebook)
#   AIVEN_DB_USER           — database user (usually avnadmin)
#   AIVEN_DB_PASSWORD       — password for the database user
#   AIVEN_CA_CERT_PATH      — path to the downloaded ca.pem file (e.g. ca.pem)

spring.datasource.url=jdbc:mysql://${AIVEN_HOST}:${AIVEN_PORT}/${AIVEN_DB_NAME}?sslMode=VERIFY_IDENTITY&trustCertificateKeyStoreUrl=file:${AIVEN_CA_CERT_PATH}&trustCertificateKeyStoreType=JKS&trustCertificateKeyStorePassword=secret&serverTimezone=Asia/Kolkata
spring.datasource.username=${AIVEN_DB_USER}
spring.datasource.password=${AIVEN_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
